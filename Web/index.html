<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfoVis – Spotify 3D Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: system-ui, sans-serif; }

    #renderCanvas { width: 100vw; height: 100vh; touch-action: none; }

    /* ── Loading ─────────────────────────────── */
    #loading-screen {
      position: fixed; inset: 0; background: #0a0a0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; z-index: 999;
    }
    #loading-screen h1 { font-size: 1.4rem; margin-bottom: 1rem; letter-spacing: 0.05em; }
    #loading-bar-wrap  { width: min(300px,80vw); height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
    #loading-bar       { height: 100%; width: 0%; background: #1db954; transition: width 0.2s; }
    #loading-text      { margin-top: 0.75rem; font-size: 0.82rem; color: #888; text-align: center; padding: 0 1rem; }

    /* ── Top bar ─────────────────────────────── */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 0.75rem;
      z-index: 201;
      pointer-events: none; /* children handle their own events */
    }

    /* Menu toggle */
    #menu-toggle {
      pointer-events: all;
      background: rgba(10,10,20,0.88);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; border-radius: 8px;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.85rem;
      backdrop-filter: blur(8px);
      display: flex; align-items: center; gap: 0.35rem;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #menu-toggle .arrow { transition: transform 0.2s; font-size: 0.65rem; }
    #menu-toggle.open .arrow { transform: rotate(180deg); }

    /* Search bar */
    #search-bar {
      pointer-events: all;
      flex: 1;
      position: relative;
      display: flex; align-items: center;
    }
    #search-input {
      width: 100%;
      background: rgba(10,10,20,0.88);
      border: 1px solid rgba(255,255,255,0.18);
      color: #fff; border-radius: 8px;
      padding: 0.5rem 2rem 0.5rem 2.1rem;
      font-size: 0.85rem;
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.15s;
    }
    #search-input::placeholder { color: #555; }
    #search-input:focus        { border-color: #1db954; }
    .search-icon {
      position: absolute; left: 0.6rem;
      color: #555; font-size: 0.85rem;
      pointer-events: none;
    }
    #search-clear {
      position: absolute; right: 0.5rem;
      background: none; border: none; color: #555;
      font-size: 0.9rem; cursor: pointer; padding: 0.2rem;
      display: none;
    }
    #search-input:not(:placeholder-shown) ~ #search-clear { display: block; }

    /* Search dropdown */
    #search-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: rgba(8,8,18,0.97);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.2s ease;
      z-index: 300;
      backdrop-filter: blur(16px);
    }
    #search-dropdown.open { max-height: 400px; overflow-y: auto; }

    .search-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      border-bottom: 1px solid #111;
      -webkit-tap-highlight-color: transparent;
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover, .search-item:active { background: rgba(255,255,255,0.06); }
    .si-dot    { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .si-info   { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .si-name   { font-size: 0.82rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .si-artist { font-size: 0.72rem; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .si-pop    { font-size: 0.72rem; color: #1db954; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .search-empty { padding: 0.75rem; color: #555; font-size: 0.82rem; text-align: center; }

    /* ── Side panel ──────────────────────────── */
    #menu-overlay {
      display: none; position: fixed; inset: 0; z-index: 199;
      background: rgba(0,0,0,0.4);
    }
    #menu-overlay.open { display: block; }

    #menu-panel {
      position: fixed; top: 0; left: 0; height: 100dvh;
      width: min(280px,88vw);
      background: rgba(8,8,18,0.97);
      border-right: 1px solid rgba(255,255,255,0.12);
      color: #fff; z-index: 200;
      font-size: 0.82rem;
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter: blur(16px);
    }
    #menu-panel.open { transform: translateX(0); }

    #menu-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid #1a1a2e;
      flex-shrink: 0;
    }
    #menu-panel-header h2 { font-size: 0.95rem; color: #1db954; }
    #menu-close { background: none; border: none; color: #666; font-size: 1.1rem; cursor: pointer; padding: 0.2rem; }
    #menu-close:hover { color: #fff; }

    #menu-scroll {
      overflow-y: auto; flex: 1;
      padding: 0.75rem 1rem 1.5rem;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }

    /* Section accordion */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0; cursor: pointer; color: #888;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em;
      border-top: 1px solid #1a1a2e; margin-top: 0.5rem;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .section-head:first-child { border-top: none; margin-top: 0; }
    .section-head .arr { transition: transform 0.2s; font-size: 0.6rem; }
    .section-head.collapsed .arr { transform: rotate(-90deg); }
    .section-body { overflow: hidden; transition: max-height 0.25s ease; }
    .section-body.collapsed { max-height: 0 !important; }

    /* Controls */
    #menu-panel label { display: block; margin: 0.45rem 0 0.12rem; color: #999; font-size: 0.78rem; }
    #menu-panel select {
      width: 100%; background: #111122; color: #fff;
      border: 1px solid #2a2a3e; border-radius: 5px;
      padding: 0.3rem 0.5rem; font-size: 0.8rem;
    }
    .slider-row { display: flex; align-items: center; gap: 0.4rem; }
    .slider-row input[type=range] { flex: 1; accent-color: #1db954; }
    .slider-val { min-width: 2.8rem; text-align: right; color: #1db954; font-size: 0.76rem; font-variant-numeric: tabular-nums; }
    .toggle-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.45rem; }
    .toggle-row input { accent-color: #1db954; }

    /* Recently viewed */
    .recent-item {
      display: flex; align-items: center; gap: 0.55rem;
      padding: 0.45rem 0; cursor: pointer;
      border-bottom: 1px solid #111;
      -webkit-tap-highlight-color: transparent;
    }
    .recent-item:last-child { border-bottom: none; }
    .recent-item:hover, .recent-item:active { opacity: 0.75; }
    .ri-dot    { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ri-info   { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .ri-name   { font-size: 0.8rem; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ri-artist { font-size: 0.7rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ri-pop    { font-size: 0.7rem; color: #1db954; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .recent-empty { color: #444; font-size: 0.78rem; padding: 0.3rem 0; }

    /* ── XR Buttons ──────────────────────────── */
    #xr-buttons {
      position: fixed; bottom: 1rem; right: 1rem;
      display: flex; gap: 0.5rem; z-index: 100;
    }
    .xr-btn {
      padding: 0.55rem 1rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 8px; cursor: pointer;
      font-size: 0.8rem; backdrop-filter: blur(8px);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .xr-btn:hover    { background: rgba(255,255,255,0.2); }
    .xr-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Info panel (bottom sheet) ───────────── */
    #info-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(8,8,18,0.96);
      border-top: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 0.8rem; z-index: 150;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      max-height: 45vh; display: flex; flex-direction: column;
    }
    #info-panel.open { transform: translateY(0); }

    #info-handle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.6rem 1rem; border-bottom: 1px solid #1a1a2e;
      cursor: pointer; flex-shrink: 0;
    }
    #info-title-row { display: flex; flex-direction: column; }
    .track-name { font-size: 0.92rem; font-weight: 600; }
    .artist     { font-size: 0.75rem; color: #aaa; }
    #info-close { background: none; border: none; color: #666; font-size: 1rem; cursor: pointer; padding: 0.2rem; }

    #info-body { overflow-y: auto; padding: 0.75rem 1rem 1rem; flex: 1; }
    .genre-chip {
      display: inline-block; padding: 0.15rem 0.6rem;
      border-radius: 999px; font-size: 0.72rem; margin-bottom: 0.5rem;
    }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.2rem 1rem; }
    .stat-label { color: #666; }
    .stat-val   { color: #1db954; text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="loading-screen">
    <h1>Spotify 3D Visualizer</h1>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-text">Loading dataset…</div>
  </div>

  <div id="menu-overlay"></div>

  <!-- Top bar: menu toggle + search -->
  <div id="top-bar">
    <button id="menu-toggle">☰ <span class="arrow">▼</span></button>

    <div id="search-bar">
      <span class="search-icon">🔍</span>
      <input id="search-input" type="search" placeholder="Search track…" autocomplete="off" spellcheck="false"/>
      <button id="search-clear">✕</button>
      <div id="search-dropdown"></div>
    </div>
  </div>

  <!-- Side panel -->
  <div id="menu-panel">
    <div id="menu-panel-header">
      <h2>🎵 Spotify Visualizer</h2>
      <button id="menu-close">✕</button>
    </div>
    <div id="menu-scroll">

      <!-- Recently Viewed -->
      <div class="section-head" data-section="recent">Recently Viewed <span class="arr">▾</span></div>
      <div class="section-body" id="sec-recent">
        <div id="recent-list"></div>
      </div>

      <!-- Axes -->
      <div class="section-head" data-section="axes">Axes <span class="arr">▾</span></div>
      <div class="section-body" id="sec-axes">
        <label>X Axis</label><select id="axis-x"></select>
        <label>Y Axis</label><select id="axis-y"></select>
        <label>Z Axis</label><select id="axis-z"></select>
      </div>

      <!-- Filters -->
      <div class="section-head" data-section="filters">Filters <span class="arr">▾</span></div>
      <div class="section-body" id="sec-filters">
        <label>Genre</label>
        <select id="filter-genre"><option value="">All Genres</option></select>

        <label>Popularity</label>
        <div class="slider-row"><input type="range" id="pop-min" min="0" max="100" value="0"/><span class="slider-val" id="pop-min-v">0</span></div>
        <div class="slider-row"><input type="range" id="pop-max" min="0" max="100" value="100"/><span class="slider-val" id="pop-max-v">100</span></div>

        <label>Energy</label>
        <div class="slider-row"><input type="range" id="energy-min" min="0" max="100" value="0"/><span class="slider-val" id="energy-min-v">0.00</span></div>
        <div class="slider-row"><input type="range" id="energy-max" min="0" max="100" value="100"/><span class="slider-val" id="energy-max-v">1.00</span></div>

        <label>Danceability</label>
        <div class="slider-row"><input type="range" id="dance-min" min="0" max="100" value="0"/><span class="slider-val" id="dance-min-v">0.00</span></div>
        <div class="slider-row"><input type="range" id="dance-max" min="0" max="100" value="100"/><span class="slider-val" id="dance-max-v">1.00</span></div>

        <label>Valence</label>
        <div class="slider-row"><input type="range" id="valence-min" min="0" max="100" value="0"/><span class="slider-val" id="valence-min-v">0.00</span></div>
        <div class="slider-row"><input type="range" id="valence-max" min="0" max="100" value="100"/><span class="slider-val" id="valence-max-v">1.00</span></div>

        <label>Tempo (BPM)</label>
        <div class="slider-row"><input type="range" id="tempo-min" min="40" max="220" value="40"/><span class="slider-val" id="tempo-min-v">40</span></div>
        <div class="slider-row"><input type="range" id="tempo-max" min="40" max="220" value="220"/><span class="slider-val" id="tempo-max-v">220</span></div>

        <div class="toggle-row">
          <input type="checkbox" id="filter-explicit"/>
          <label style="margin:0">Explicit only</label>
        </div>
      </div>

      <!-- Display -->
      <div class="section-head" data-section="display">Display <span class="arr">▾</span></div>
      <div class="section-body" id="sec-display">
        <label>Track count: <span id="count-label">500</span></label>
        <input type="range" id="track-count" min="50" max="2000" value="500" step="50" style="width:100%;accent-color:#1db954"/>
      </div>

    </div>
  </div>

  <!-- XR buttons -->
  <div id="xr-buttons">
    <button class="xr-btn" id="btn-ar" disabled>Enter AR</button>
    <button class="xr-btn" id="btn-vr" disabled>Enter VR</button>
  </div>

  <!-- Info bottom sheet -->
  <div id="info-panel">
    <div id="info-handle">
      <div id="info-title-row">
        <span class="track-name" id="info-name">—</span>
        <span class="artist"     id="info-artist">—</span>
      </div>
      <button id="info-close">✕</button>
    </div>
    <div id="info-body">
      <div class="genre-chip" id="info-genre">—</div>
      <div class="stats" id="info-stats"></div>
    </div>
  </div>

  <script>
    // Panel open/close
    const panel   = document.getElementById('menu-panel');
    const toggle  = document.getElementById('menu-toggle');
    const overlay = document.getElementById('menu-overlay');
    const openMenu  = () => { panel.classList.add('open'); toggle.classList.add('open'); overlay.classList.add('open'); };
    const closeMenu = () => { panel.classList.remove('open'); toggle.classList.remove('open'); overlay.classList.remove('open'); };
    toggle.addEventListener('click', () => panel.classList.contains('open') ? closeMenu() : openMenu());
    document.getElementById('menu-close').addEventListener('click', closeMenu);
    overlay.addEventListener('click', closeMenu);

    // Accordions
    document.querySelectorAll('.section-head').forEach(head => {
      const body = document.getElementById('sec-' + head.dataset.section);
      body.style.maxHeight = body.scrollHeight + 'px';
      head.addEventListener('click', () => {
        const col = head.classList.toggle('collapsed');
        body.classList.toggle('collapsed', col);
        if (!col) body.style.maxHeight = body.scrollHeight + 'px';
      });
    });

    // Info close
    document.getElementById('info-close').addEventListener('click', () =>
      document.getElementById('info-panel').classList.remove('open'));
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
